<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Examination Result | Bihar National College Patna</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="header-placeholder"></div>

  <section class="page-banner">
    <div class="container">
      <h1 class="page-banner-title">Examination Results</h1>
      <div class="breadcrumbs">
        <a href="index.html">Home</a> &gt; <a href="exam_control.html">Exams</a> &gt; <span>Results</span>
      </div>
    </div>
  </section>

  <section class="section">
    <div class="container" style="max-width: 600px;">
      <div class="card">
        <h2 style="font-size: 22px; margin-bottom: 20px; border-bottom: 2px solid var(--border); padding-bottom: 10px;">Result Inquiry Portal</h2>
        
        <form onsubmit="event.preventDefault(); alert('Results for the requested roll number are not declared yet. Please check again later.');">
          <div class="form-group">
            <label class="form-label" for="examRoll">Roll Number</label>
            <input type="text" id="examRoll" class="form-control" placeholder="e.g. PU20260492" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="semesterSelect">Semester / Year</label>
            <select id="semesterSelect" class="form-control" required>
              <option value="">Select Semester</option>
              <option value="sem1">Semester I</option>
              <option value="sem2">Semester II</option>
              <option value="sem3">Semester III</option>
              <option value="sem4">Semester IV</option>
            </select>
          </div>
          <button type="submit" class="btn-primary">Search Result</button>
        </form>
      </div>
    </div>
  </section>

  <div id="footer-placeholder"></div>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
