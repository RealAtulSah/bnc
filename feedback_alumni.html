<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alumni Feedback | Bihar National College Patna</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="header-placeholder"></div>

  <section class="page-banner">
    <div class="container">
      <h1 class="page-banner-title">Alumni Feedback</h1>
      <div class="breadcrumbs">
        <a href="index.html">Home</a> &gt; <a href="brief_introduction.html">Alumni</a> &gt; <span>Feedback</span>
      </div>
    </div>
  </section>

  <section class="section">
    <div class="container" style="max-width: 800px;">
      <div class="card">
        <h2 style="font-size: 22px; margin-bottom: 20px; border-bottom: 2px solid var(--border); padding-bottom: 10px;">Alumni Feedback Form</h2>
        
        <form onsubmit="event.preventDefault(); alert('Thank you for your valuable feedback!'); this.reset();">
          <div class="form-group">
            <label class="form-label" for="alumniName">Full Name</label>
            <input type="text" id="alumniName" class="form-control" placeholder="Enter your name" required>
          </div>
          <div class="grid grid-2">
            <div class="form-group">
              <label class="form-label" for="batchYear">Passing Batch Year</label>
              <input type="number" id="batchYear" class="form-control" placeholder="e.g. 1998" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="alumniDept">Department</label>
              <input type="text" id="alumniDept" class="form-control" placeholder="e.g. Physics" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="profession">Current Profession / Designation</label>
            <input type="text" id="profession" class="form-control" placeholder="e.g. Software Engineer, IAS Officer" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="feedbackText">Feedback / Suggestions for College Development</label>
            <textarea id="feedbackText" class="form-control" rows="5" placeholder="Share your suggestions or memories here..." required style="resize: vertical;"></textarea>
          </div>
          <button type="submit" class="btn-primary">Submit Feedback</button>
        </form>
      </div>
    </div>
  </section>

  <div id="footer-placeholder"></div>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
